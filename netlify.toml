[build]
  command = "npx turbo run build"
  publish = "dist"

[build.environment]
  # Bỏ qua quét bảo mật cho các biến môi trường công khai của Supabase
  # Netlify mặc định sẽ quét và chặn nếu thấy giá trị của bất kỳ biến môi trường nào xuất hiện trong bundle.
  # Xem thêm: https://docs.netlify.com/configure-builds/secrets-scanning/
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"
