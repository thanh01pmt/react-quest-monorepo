[build]
  # Thêm các phím Supabase công khai vào danh sách bỏ qua quét bảo mật
  # Vì đây là ứng dụng client-side, các phím này bắt buộc phải có trong bundle.
  # Netlify Secret Scanning mặc định sẽ chặn nếu thấy các giá trị giống secret.
  # https://docs.netlify.com/configure-builds/secrets-scanning/
  [build.processing.secrets_scanning]
    omit_keys = ["VITE_SUPABASE_URL", "VITE_SUPABASE_ANON_KEY"]
