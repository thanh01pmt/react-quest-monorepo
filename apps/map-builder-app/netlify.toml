# netlify.toml cho map-builder-app
# Set base directory trong Netlify UI là "apps/map-builder-app"
# Lưu ý: Command cần chạy từ root của monorepo

[build]
  # Build command cho map-builder-app (chạy từ root của monorepo)
  command = "cd ../.. && turbo run build --filter @repo/map-builder-app"
  # Thư mục chứa ứng dụng của bạn sau khi build. Đối với Vite, thường là 'dist'.
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

