[build]
  command = "pnpm turbo run build --filter=@repo/contest-dashboard"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . ../../packages/quest-player ../../package.json ../../pnpm-workspace.yaml ../../pnpm-lock.yaml ../../turbo.json ../../scripts/"

[build.environment]
  NODE_ENV = "development"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# Cấu hình khuyến nghị trong Netlify UI:
# - Base directory: / (root của monorepo)
# - Publish directory: apps/contest-dashboard/dist

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
