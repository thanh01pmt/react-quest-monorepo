# netlify.toml cho react-quest-app
# Cấu hình được set trong Netlify UI để tránh conflict:
# - Base directory: / (hoặc để trống)
# - Package directory: apps/react-quest-app
# - Build command: cd ../.. && pnpm turbo run build --filter @repo/react-quest-app
# - Publish directory: apps/react-quest-app/dist
# 
# Không set build command và publish directory ở đây để Netlify dùng từ UI settings

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

