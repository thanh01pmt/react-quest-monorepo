# netlify.toml cho react-quest-app
# Cấu hình Netlify UI:
# - Base directory: (để trống)
# - Package directory: apps/react-quest-app
# - Build command: cd ../.. && pnpm turbo run build --filter @repo/react-quest-app
# - Publish directory: dist

[build]
  # Build command chạy từ root của monorepo
  # Khi package directory được set, Netlify sẽ cd vào đó trước khi chạy command
  # Tìm root bằng cách tìm thư mục chứa pnpm-workspace.yaml
  command = "while [ ! -f pnpm-workspace.yaml ] && [ \"$PWD\" != \"/\" ]; do cd ..; done && pnpm turbo run build --filter @repo/react-quest-app"
  # Publish directory relative to package directory (apps/react-quest-app/dist)
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

