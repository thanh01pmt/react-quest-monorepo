[build]
  command = "pnpm install && pnpm turbo run build --filter=@repo/react-quest-app"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . ../../packages/quest-player ../../packages/academic-map-generator ../../packages/shared-templates ../../package.json ../../pnpm-workspace.yaml ../../pnpm-lock.yaml ../../turbo.json ../../scripts/"

[build.environment]
  NODE_ENV = "development"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# Cấu hình được set trong Netlify UI để tránh conflict:
# - Base directory: / (hoặc để trống)
# - Package directory: apps/react-quest-app
# - Build command: while [ ! -f pnpm-workspace.yaml ] && [ "$PWD" != "/" ]; do cd ..; done && pnpm turbo run build --filter @repo/react-quest-app
# - Publish directory: apps/react-quest-app/dist
# 
# Không set build command và publish directory ở đây để Netlify dùng từ UI settings

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

