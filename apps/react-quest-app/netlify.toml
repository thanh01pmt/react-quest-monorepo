# netlify.toml cho react-quest-app
# Set base directory trong Netlify UI là "apps/react-quest-app"
# Lưu ý: Command cần chạy từ root của monorepo

[build]
  # Build command cho react-quest-app (chạy từ root của monorepo)
  # Netlify sẽ tự động install dependencies từ root trước khi chạy command này
  command = "cd ../.. && pnpm turbo run build --filter @repo/react-quest-app"
  # Thư mục chứa ứng dụng của bạn sau khi build. Đối với Vite, thường là 'dist'.
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

