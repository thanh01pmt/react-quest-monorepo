    <ellipse cx="26" cy="6" rx="2" ry="6" fill="#ffcccc"/>
    <!-- Eyes -->
    <circle cx="17" cy="13" r="2" fill="#333"/>
    <circle cx="23" cy="13" r="2" fill="#333"/>
    <!-- Nose -->
    <ellipse cx="20" cy="17" rx="2" ry="1.5" fill="#ffcccc"/>
    <!-- Cheeks -->
