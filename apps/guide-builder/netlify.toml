# netlify.toml cho guide-builder
[build]
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . ../../packages/quest-player ../../package.json ../../pnpm-workspace.yaml ../../pnpm-lock.yaml ../../turbo.json ../../scripts/"

# Cấu hình khuyến nghị trong Netlify UI:
# - Base directory: / (root của monorepo)
# - Build command: pnpm --filter @repo/guide-builder build
# - Publish directory: apps/guide-builder/dist

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
